<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>360toCube</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@300;400;700&display=swap');
  :root{--bg:#0a0a0f;--surface:#12121a;--border:#2a2a3a;--accent:#c8ff5a;--accent2:#5af0ff;--text:#e8e8f0;--muted:#666680;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;
    height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;
    padding-bottom:env(safe-area-inset-bottom);}
  header{padding:10px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;flex-shrink:0;}
  .logo{font-family:'Space Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:.15em;text-transform:uppercase;}
  .title{font-size:12px;color:var(--muted);font-weight:300;}
  .body{flex:1;min-height:0;display:flex;flex-direction:column;}
  .canvas-area{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;position:relative;padding:14px;border-bottom:1px solid var(--border);}
  canvas#preview{max-width:100%;max-height:100%;border-radius:6px;box-shadow:0 0 40px rgba(0,0,0,.8);display:none;}
  .placeholder{text-align:center;color:var(--muted);}
  .placeholder .big{font-size:48px;margin-bottom:8px;opacity:.25;}
  .placeholder p{font-size:13px;line-height:2;}
  .status-bar{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:rgba(10,10,15,.92);border:1px solid var(--border);border-radius:20px;padding:4px 14px;font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);white-space:nowrap;}
  .panel{flex:1;min-height:0;display:flex;background:var(--surface);}
  .controls-scroll{flex:1;min-width:0;overflow-y:auto;overflow-x:hidden;padding:14px 16px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch;}
  .controls-scroll::-webkit-scrollbar{width:3px;}
  .controls-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
  .section-title{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
  .ctrl{display:flex;flex-direction:column;gap:4px;min-width:0;}
  .ctrl label{font-size:10px;color:var(--muted);}
  .ctrl-row{display:flex;align-items:center;gap:8px;}
  .num-input{font-family:'Space Mono',monospace;font-size:11px;color:var(--accent2);background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:2px 5px;width:62px;flex-shrink:0;text-align:right;outline:none;}
  .num-input:focus{border-color:var(--accent2);}
  input[type=range]{-webkit-appearance:none;flex:1;height:2px;background:var(--border);border-radius:2px;outline:none;touch-action:pan-y;min-width:0;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--accent);cursor:pointer;}
  .divider{height:1px;background:var(--border);flex-shrink:0;}
  .bg-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;}
  .bg-btn{padding:7px 2px;border:1px solid var(--border);border-radius:5px;background:transparent;color:var(--muted);font-family:'Space Mono',monospace;font-size:9px;cursor:pointer;text-align:center;}
  .bg-btn.active{border-color:var(--accent2);color:var(--accent2);background:rgba(90,240,255,.06);}
  .ratio-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:6px;}
  .ratio-btn{padding:6px 2px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--muted);font-family:'Space Mono',monospace;font-size:9px;cursor:pointer;text-align:center;line-height:1.4;}
  .ratio-btn.active{border-color:var(--accent);color:var(--accent);}
  .orient-row{display:flex;align-items:center;gap:8px;}
  .flip-btn{padding:5px 10px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--muted);font-size:10px;cursor:pointer;}
  .ratio-info{font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;}
  /* アニメ */
  .anim-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:6px;}
  .anim-btn{padding:7px 2px;border:1px solid var(--border);border-radius:5px;background:transparent;color:var(--muted);font-family:'Space Mono',monospace;font-size:9px;cursor:pointer;text-align:center;line-height:1.4;}
  .anim-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(200,255,90,.05);}
  .anim-settings{display:flex;flex-direction:column;gap:6px;}
  /* アクションパネル */
  .action-panel{width:180px;flex-shrink:0;border-left:1px solid var(--border);padding:14px 12px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .drop-btn{border:1px dashed var(--border);border-radius:6px;padding:10px 8px;cursor:pointer;text-align:center;}
  .drop-btn:hover{border-color:var(--accent);}
  .drop-btn input{display:none;}
  .drop-lbl{font-size:10px;color:var(--muted);margin-bottom:3px;}
  .drop-fname{font-size:10px;color:var(--accent);font-family:'Space Mono',monospace;word-break:break-all;}
  .btn{padding:10px 12px;border:none;border-radius:6px;cursor:pointer;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;width:100%;}
  .btn-primary{background:var(--accent);color:#0a0a0f;font-weight:700;}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed;}
  .btn-secondary{background:transparent;color:var(--accent2);border:1px solid var(--accent2);}
  .btn-secondary:disabled{opacity:.3;cursor:not-allowed;}
  .btn-muted{background:transparent;color:var(--muted);border:1px solid var(--border);}
  .btn-muted:disabled{opacity:.3;cursor:not-allowed;}
  .btn-row{display:flex;gap:5px;}
  .btn-row .btn{flex:1;}
  .fmt-row{display:flex;gap:4px;}
  .fmt-btn{flex:1;padding:7px 4px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--muted);font-family:'Space Mono',monospace;font-size:10px;cursor:pointer;text-align:center;}
  .fmt-btn.active{border-color:var(--accent2);color:var(--accent2);background:rgba(90,240,255,.06);}
  .small-label{font-size:10px;color:var(--muted);}
  .progress{width:100%;height:2px;background:var(--border);border-radius:2px;overflow:hidden;}
  .progress-bar{height:100%;background:var(--accent);width:0%;}
  .dir-btn{width:100%;padding:10px;border:1px solid var(--accent2);border-radius:6px;background:transparent;color:var(--accent2);font-family:'Space Mono',monospace;font-size:10px;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;}
  .rnd-btn{width:100%;padding:10px;border:1px solid var(--accent);border-radius:6px;background:transparent;color:var(--accent);font-family:'Space Mono',monospace;font-size:10px;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;}
  canvas#offscreen{display:none;}
  .anim-toggle-btn{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);font-family:'Space Mono',monospace;font-size:10px;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;}
  .anim-toggle-btn.on{border-color:var(--accent);color:var(--accent);}
</style>
</head>
<body>
<header>
  <div class="logo">360° → Cube</div>
  <div class="title">エクイレクタングラー → キューブ投影</div>
</header>
<div class="body">
  <div class="canvas-area">
    <div class="placeholder" id="placeholder"><div class="big">📦</div><p>下のパネルから画像を読み込んでください</p></div>
    <canvas id="preview"></canvas>
    <div class="status-bar" id="statusBar">待機中</div>
  </div>
  <div class="panel">
    <div class="controls-scroll">

      <div class="section-title">📐 視点</div>
      <div class="ctrl"><label>水平回転 Yaw</label>
        <div class="ctrl-row"><input type="range" id="yaw" min="-180" max="180" value="0" step="1"><input class="num-input" id="yaw_num" type="number" value="0"></div></div>
      <div class="ctrl"><label>垂直回転 Pitch</label>
        <div class="ctrl-row"><input type="range" id="pitch" min="-45" max="45" value="0" step="1"><input class="num-input" id="pitch_num" type="number" value="0"></div></div>
      <div class="ctrl"><label>見下ろし角度</label>
        <div class="ctrl-row"><input type="range" id="elev" min="5" max="80" value="30" step="1"><input class="num-input" id="elev_num" type="number" value="30"></div></div>

      <div class="divider"></div>
      <div class="section-title">📦 箱の回転・形状</div>
      <div class="ctrl"><label>箱の水平回転</label>
        <div class="ctrl-row"><input type="range" id="tilt" min="-180" max="180" value="45" step="1"><input class="num-input" id="tilt_num" type="number" value="45"></div></div>
      <div class="ctrl"><label>箱の垂直回転</label>
        <div class="ctrl-row"><input type="range" id="vtilt" min="-90" max="90" value="0" step="1"><input class="num-input" id="vtilt_num" type="number" value="0"></div></div>
      <div class="ctrl"><label>高さ比率</label>
        <div class="ctrl-row"><input type="range" id="hr" min="0.2" max="2.0" value="1.00" step="0.05"><input class="num-input" id="hr_num" type="number" value="1.00"></div></div>
      <div class="ctrl"><label>視野の広さ</label>
        <div class="ctrl-row"><input type="range" id="aperture" min="0.3" max="1.5" value="0.80" step="0.01"><input class="num-input" id="aperture_num" type="number" value="0.80"></div></div>

      <div class="divider"></div>
      <div class="section-title">🔀 視点移動</div>
      <div class="ctrl"><label>垂直移動</label>
        <div class="ctrl-row"><input type="range" id="vshift" min="-1" max="1" value="0" step="0.05"><input class="num-input" id="vshift_num" type="number" value="0"></div></div>
      <div class="ctrl"><label>水平移動</label>
        <div class="ctrl-row"><input type="range" id="hshift" min="-1" max="1" value="0" step="0.05"><input class="num-input" id="hshift_num" type="number" value="0"></div></div>

      <div class="divider"></div>
      <div class="section-title">🎨 背景</div>
      <div class="bg-btns">
        <button class="bg-btn"        id="bg_white"       onclick="setBg('white')">⬜ 白</button>
        <button class="bg-btn"        id="bg_black"       onclick="setBg('black')">⬛ 黒</button>
        <button class="bg-btn active" id="bg_blur"        onclick="setBg('blur')">🌫 ぼかし</button>
        <button class="bg-btn"        id="bg_transparent" onclick="setBg('transparent')">透明</button>
      </div>

      <div class="divider"></div>
      <div class="section-title">📏 アスペクト比</div>
      <div class="ratio-btns">
        <button class="ratio-btn active" id="ratio_1_1"  onclick="setRatio('1:1')">1:1<br>正方形</button>
        <button class="ratio-btn"        id="ratio_3_2"  onclick="setRatio('3:2')">3:2</button>
        <button class="ratio-btn"        id="ratio_4_3"  onclick="setRatio('4:3')">4:3</button>
        <button class="ratio-btn"        id="ratio_16_9" onclick="setRatio('16:9')">16:9</button>
      </div>
      <div class="orient-row">
        <button class="flip-btn" id="orientBtn" onclick="flipOrientation()">🔄 横向き</button>
        <span class="ratio-info" id="ratioDisplay">2048 × 2048</span>
      </div>

      <div class="divider"></div>
      <div class="section-title" id="animSectionTitle" style="opacity:0.4">🎬 アニメ出力（ONにすると有効）</div>
      <div id="animSection" style="opacity:0.4;pointer-events:none;display:flex;flex-direction:column;gap:6px;">
      <div class="anim-btns">
        <button class="anim-btn active" id="anim_yaw"   onclick="setAnimMode('yaw')">水平<br>回転</button>
        <button class="anim-btn"        id="anim_vtilt" onclick="setAnimMode('vtilt')">垂直<br>回転</button>
        <button class="anim-btn"        id="anim_both"  onclick="setAnimMode('both')">水平＋<br>垂直</button>
      </div>
      <div class="anim-settings">
        <div class="ctrl"><label>フレーム数（12 / 24 / 36）</label>
          <div class="ctrl-row">
            <input type="range" id="animFrames" min="12" max="36" value="24" step="12">
            <input class="num-input" id="animFrames_num" type="number" value="24" min="12" max="36" step="12">
          </div>
        </div>
        <div class="ctrl"><label>解像度 (px)</label>
          <div class="ctrl-row">
            <input type="range" id="res" min="512" max="4096" value="2048" step="256">
            <input class="num-input" id="res_num" type="number" value="2048" min="256" max="8192" step="256">
          </div>
        </div>
      </div></div>

    </div>

    <div class="action-panel">
      <div class="drop-btn" id="dropZone">
        <div class="drop-lbl">📂 ドロップ or クリック</div>
        <div class="drop-fname" id="fname">未読み込み</div>
        <input type="file" id="fileInput" accept="image/*">
      </div>
      <!-- 戻す/やり直し/初期化 → 読み込みの直下 -->
      <div class="btn-row">
        <button class="btn btn-muted" id="undoBtn" onclick="undo()" disabled>↩</button>
        <button class="btn btn-muted" id="redoBtn" onclick="redo()" disabled>↪</button>
        <button class="btn btn-muted" onclick="resetAll()">↺</button>
      </div>
      <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
      <button class="btn btn-primary" id="renderBtn" onclick="render()" disabled>🎨 レンダリング</button>
      <button class="dir-btn" id="dirBtn" onclick="nextDirection()">🔄 右向き</button>
      <button class="rnd-btn" onclick="randomPreset()">🎲 ランダム</button>
      <div class="divider"></div>
      <div class="small-label">保存形式</div>
      <div class="fmt-row">
        <div class="fmt-btn"        id="fmt_png" onclick="setFmt('png')">PNG</div>
        <div class="fmt-btn active" id="fmt_jpg" onclick="setFmt('jpg')">JPG</div>
      </div>
      <div class="ctrl" id="jpgWrap" style="display:flex;flex-direction:column;gap:4px;">
        <label class="small-label">JPG品質</label>
        <div class="ctrl-row">
          <input type="range" id="jpgq" min="1" max="100" value="92" step="1">
          <input class="num-input" id="jpgq_num" type="number" value="92">
        </div>
      </div>
      <button class="btn btn-secondary" id="saveBtn" onclick="saveImage()" disabled>🔗 画像を新タブで開く</button>
      <div class="divider"></div>
      <!-- アニメ出力ON/OFF -->
      <button class="anim-toggle-btn" id="animToggleBtn" onclick="toggleAnim()">🎬 アニメ出力 OFF</button>
      <div id="animActArea" style="display:none;flex-direction:column;gap:6px;">
        <button class="btn btn-secondary" id="animRunBtn" onclick="startAnim()" disabled>▶ アニメ生成</button>
      </div>
    </div>
  </div>
</div>
<canvas id="offscreen"></canvas>

<script>
'use strict';
let srcCanvas=null,currentFmt='jpg',bgType='blur';
const FLOATS=['hr','aperture','vshift','hshift'];
const DEFAULTS={yaw:0,pitch:0,elev:30,tilt:45,vtilt:0,vshift:0,hshift:0,hr:1.00,aperture:0.80,res:2048};

// ---- 保存形式 ----
function setFmt(f){
  currentFmt=f;
  document.getElementById('fmt_png').classList.toggle('active',f==='png');
  document.getElementById('fmt_jpg').classList.toggle('active',f==='jpg');
  document.getElementById('jpgWrap').style.display=f==='jpg'?'flex':'none';
  document.getElementById('jpgWrap').style.flexDirection='column';
}
document.getElementById('jpgq').addEventListener('input',function(){document.getElementById('jpgq_num').value=this.value;});
document.getElementById('jpgq_num').addEventListener('blur',function(){
  const v=Math.max(1,Math.min(100,parseInt(this.value)||92));
  this.value=v;document.getElementById('jpgq').value=v;
});

// ---- 背景 ----
function setBg(t){
  bgType=t;
  ['white','black','blur','transparent'].forEach(x=>document.getElementById('bg_'+x).classList.toggle('active',x===t));
  if(srcCanvas)renderDebounced();
}

// ---- アスペクト比 ----
const RATIOS={'1:1':[1,1],'3:2':[3,2],'4:3':[4,3],'16:9':[16,9]};
let currentRatio='1:1',isLandscape=true;
function setRatio(r){
  currentRatio=r;
  document.querySelectorAll('.ratio-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('ratio_'+r.replace(':','_')).classList.add('active');
  const btn=document.getElementById('orientBtn');
  const is1=r==='1:1';
  btn.style.opacity=is1?'0.3':'1';btn.style.pointerEvents=is1?'none':'auto';
  updateRatioDisplay();if(srcCanvas)renderDebounced();
}
function flipOrientation(){
  if(currentRatio==='1:1')return;
  isLandscape=!isLandscape;
  document.getElementById('orientBtn').textContent=isLandscape?'🔄 横向き':'🔄 縦向き';
  updateRatioDisplay();if(srcCanvas)renderDebounced();
}
function getOutputDims(){
  const base=getVal('res',false);
  const[rw,rh]=RATIOS[currentRatio];
  if(rw===rh)return[base,base];
  return isLandscape?[base,Math.round(base*rh/rw)]:[Math.round(base*rh/rw),base];
}
function updateRatioDisplay(){
  const[w,h]=getOutputDims();
  document.getElementById('ratioDisplay').textContent=w+' × '+h;
}
document.getElementById('res').addEventListener('input',updateRatioDisplay);

// ---- アニメモード ----
let animMode='yaw';
function setAnimMode(m){
  animMode=m;
  document.querySelectorAll('.anim-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('anim_'+m).classList.add('active');
}
// animFramesスライダー連動
document.getElementById('animFrames').addEventListener('input',function(){
  document.getElementById('animFrames_num').value=this.value;
});
document.getElementById('animFrames_num').addEventListener('blur',function(){
  const v=[12,24,36].reduce((a,b)=>Math.abs(b-parseInt(this.value))<Math.abs(a-parseInt(this.value))?b:a,24);
  this.value=v;document.getElementById('animFrames').value=v;
});

// ---- Undo/Redo ----
let history=[],histIdx=-1;
function snap(){
  return{yaw:getVal('yaw',false),pitch:getVal('pitch',false),elev:getVal('elev',false),
    tilt:getVal('tilt',false),vtilt:getVal('vtilt',false),
    vshift:getVal('vshift',true),hshift:getVal('hshift',true),
    hr:getVal('hr',true),aperture:getVal('aperture',true),res:getVal('res',false)};
}
function pushHistory(){
  const s=snap();
  if(histIdx>=0&&JSON.stringify(history[histIdx])===JSON.stringify(s))return;
  history=history.slice(0,histIdx+1);history.push(s);
  if(history.length>50)history.shift();histIdx=history.length-1;syncUR();
}
function applySnap(s){
  const floats=['hr','aperture','vshift','hshift'];
  Object.entries(s).forEach(([k,v])=>setSN(k,v,floats.includes(k)));
  if(srcCanvas)render();
}
function undo(){if(histIdx<=0)return;histIdx--;applySnap(history[histIdx]);syncUR();}
function redo(){if(histIdx>=history.length-1)return;histIdx++;applySnap(history[histIdx]);syncUR();}
function syncUR(){
  document.getElementById('undoBtn').disabled=histIdx<=0;
  document.getElementById('redoBtn').disabled=histIdx>=history.length-1;
}

// ---- ファイル読み込み ----
const dropZone=document.getElementById('dropZone'),fileInput=document.getElementById('fileInput');
dropZone.addEventListener('click',()=>fileInput.click());
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.style.borderColor='var(--accent)';});
dropZone.addEventListener('dragleave',()=>{dropZone.style.borderColor='';});
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.style.borderColor='';if(e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0]);});
fileInput.addEventListener('change',e=>{if(e.target.files[0])loadFile(e.target.files[0]);});
function loadFile(file){
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      srcCanvas=document.createElement('canvas');
      srcCanvas.width=img.width;srcCanvas.height=img.height;
      srcCanvas.getContext('2d').drawImage(img,0,0);
      blurCache=null;
      document.getElementById('fname').textContent=file.name;
      document.getElementById('renderBtn').disabled=false;
      setStatus(`読み込み完了: ${img.width}×${img.height}`);
      pushHistory();render();
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

// ---- パラメーター連動 ----
const paramDefs=[
  ['yaw','yaw_num',-180,180,false,1],['pitch','pitch_num',-45,45,false,1],
  ['elev','elev_num',5,80,false,1],['tilt','tilt_num',-180,180,false,1],
  ['vtilt','vtilt_num',-90,90,false,1],
  ['vshift','vshift_num',-1,1,true,0.05],['hshift','hshift_num',-1,1,true,0.05],
  ['hr','hr_num',0.2,2,true,0.05],['aperture','aperture_num',0.3,1.5,true,0.01],
  ['res','res_num',256,8192,false,256],
];
paramDefs.forEach(([sid,nid,mn,mx,isF,step])=>{
  const sl=document.getElementById(sid),ni=document.getElementById(nid);
  if(!sl||!ni)return;
  sl.addEventListener('mousedown',pushHistory);
  sl.addEventListener('touchstart',pushHistory,{passive:true});
  sl.addEventListener('input',()=>{ni.value=isF?parseFloat(sl.value).toFixed(2):sl.value;if(srcCanvas)renderDebounced();});
  sl.addEventListener('change',pushHistory);
  const applyN=()=>{
    let v=isF?parseFloat(ni.value):parseInt(ni.value);
    if(isNaN(v))return;
    v=Math.max(mn,Math.min(mx,v));
    sl.value=v;ni.value=isF?v.toFixed(2):v;pushHistory();if(srcCanvas)renderDebounced();
  };
  ni.addEventListener('keydown',e=>{
    if(e.key==='Enter'){applyN();return;}
    if(e.key==='ArrowUp'||e.key==='ArrowDown'){
      e.preventDefault();
      let v=isF?parseFloat(ni.value):parseInt(ni.value);
      v=isNaN(v)?0:v+(e.key==='ArrowUp'?step:-step);
      v=Math.max(mn,Math.min(mx,parseFloat(v.toFixed(4))));
      sl.value=v;ni.value=isF?v.toFixed(2):v;pushHistory();if(srcCanvas)renderDebounced();
    }
  });
  ni.addEventListener('blur',applyN);
});
function setSN(id,v,isF){
  const el=document.getElementById(id);if(el)el.value=v;
  const ni=document.getElementById(id+'_num');if(ni)ni.value=isF?parseFloat(v).toFixed(2):v;
}
function getVal(id,isF){
  const el=document.getElementById(id);
  if(!el)return isF?0.0:0;
  return isF?parseFloat(el.value):parseInt(el.value);
}
let debTimer=null;
function renderDebounced(){clearTimeout(debTimer);debTimer=setTimeout(render,90);}
function setStatus(m){document.getElementById('statusBar').textContent=m;}

// ---- 方向サイクルボタン（現在のyawから±90度ずつ） ----
function nextDirection(){
  const cur=getVal('yaw',false);
  // 現在値を90の倍数に丸めて+90
  const stepped=Math.round(cur/90)*90+90;
  // -180〜180の範囲に収める
  let next=((stepped+180)%360)-180;
  if(next===180)next=-180; // -180と180を同一視
  setSN('yaw',next,false);
  // ラベル更新
  const labelMap={'0':'標準','90':'右向き','-90':'左向き','180':'背面','-180':'背面'};
  const label=labelMap[String(next)]||next+'°';
  document.getElementById('dirBtn').textContent='🔄 '+label;
  pushHistory();if(srcCanvas)render();
}

function rnd(a,b,d=0){const v=Math.random()*(b-a)+a;return d>0?parseFloat(v.toFixed(d)):Math.round(v);}
function randomPreset(){
  setSN('yaw',rnd(-180,180),false);setSN('pitch',rnd(-30,30),false);
  setSN('elev',rnd(10,65),false);setSN('tilt',rnd(-180,180),false);
  setSN('vtilt',rnd(-45,45),false);
  setSN('vshift',rnd(-0.4,0.4,2),true);setSN('hshift',rnd(-0.4,0.4,2),true);
  setSN('hr',rnd(0.4,1.8,2),true);setSN('aperture',rnd(0.5,1.1,2),true);
  pushHistory();if(srcCanvas)render();setStatus('🎲 ランダム適用');
}
function resetAll(){
  Object.entries(DEFAULTS).forEach(([k,v])=>setSN(k,v,FLOATS.includes(k)));
  pushHistory();if(srcCanvas)render();
}

// ---- equirectサンプラー ----
let eqBuf=null,eqW32=0,eqH32=0;
function prepareEq(){
  const d=srcCanvas.getContext('2d').getImageData(0,0,srcCanvas.width,srcCanvas.height);
  eqBuf=new Uint32Array(d.data.buffer);
  eqW32=srcCanvas.width;eqH32=srcCanvas.height;
}
function sampleEq(theta,phi){
  let u=(theta/(2*Math.PI)+0.5)*eqW32;
  let v=(0.5-phi/Math.PI)*eqH32;
  u=((u%eqW32)+eqW32)%eqW32;
  v=Math.max(0,Math.min(eqH32-1.001,v));
  const xi=u|0,yi=v|0,fx=u-xi,fy=v-yi;
  const x1=xi+1>=eqW32?0:xi+1,y1=Math.min(yi+1,eqH32-1);
  function px(x,y){const p=eqBuf[y*eqW32+x];return[p&0xff,(p>>8)&0xff,(p>>16)&0xff];}
  const c00=px(xi,yi),c10=px(x1,yi),c01=px(xi,y1),c11=px(x1,y1);
  const w00=(1-fx)*(1-fy),w10=fx*(1-fy),w01=(1-fx)*fy,w11=fx*fy;
  return[c00[0]*w00+c10[0]*w10+c01[0]*w01+c11[0]*w11,
         c00[1]*w00+c10[1]*w10+c01[1]*w01+c11[1]*w11,
         c00[2]*w00+c10[2]*w10+c01[2]*w01+c11[2]*w11];
}

// ---- 背景 ----
let blurCache=null;
function drawBackground(ctx,w,h){
  if(bgType==='transparent')return;
  if(bgType==='white'){ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);return;}
  if(bgType==='black'){ctx.fillStyle='#000';ctx.fillRect(0,0,w,h);return;}
  if(!blurCache||blurCache.w!==w||blurCache.h!==h){
    const BW=Math.min(srcCanvas.width,512),BH=Math.round(BW*srcCanvas.height/srcCanvas.width);
    let cur=document.createElement('canvas');cur.width=BW;cur.height=BH;
    cur.getContext('2d').drawImage(srcCanvas,0,0,BW,BH);
    for(let p=0;p<4;p++){
      const s2=document.createElement('canvas');
      s2.width=Math.max(4,cur.width>>1);s2.height=Math.max(4,cur.height>>1);
      const c2=s2.getContext('2d');c2.filter='blur(6px)';c2.drawImage(cur,0,0,s2.width,s2.height);c2.filter='none';cur=s2;
    }
    const sz=Math.max(w,h);
    const fin=document.createElement('canvas');fin.width=sz;fin.height=sz;
    const fc=fin.getContext('2d');
    const sc=Math.max(sz/srcCanvas.width,sz/srcCanvas.height);
    const dw=srcCanvas.width*sc,dh=srcCanvas.height*sc;
    fc.filter='blur(30px)';fc.drawImage(cur,(sz-dw)/2,(sz-dh)/2,dw,dh);fc.filter='none';
    fc.fillStyle='rgba(0,0,0,0.4)';fc.fillRect(0,0,sz,sz);
    blurCache={canvas:fin,w,h};
  }
  ctx.drawImage(blurCache.canvas,0,0,w,h);
}

// ---- レンダリング ----
function render(){
  if(!srcCanvas)return;
  const outSize=getVal('res',false);
  const[outW,outH]=getOutputDims();
  setStatus('レンダリング中...');
  document.getElementById('progressBar').style.width='0%';
  prepareEq();

  const params={
    yawA:getVal('yaw',false)*Math.PI/180,
    pitA:getVal('pitch',false)*Math.PI/180,
    elevA:getVal('elev',false)*Math.PI/180,
    tiltA:getVal('tilt',false)*Math.PI/180,
    vtiltA:getVal('vtilt',false)*Math.PI/180,
    vsh:getVal('vshift',true),hsh:getVal('hshift',true),
    hR:getVal('hr',true),apt:getVal('aperture',true),
  };

  // レンダリング
  const oc=document.getElementById('offscreen');
  oc.width=outW;oc.height=outH;
  const ctx=oc.getContext('2d');
  ctx.clearRect(0,0,outW,outH);
  drawBackground(ctx,outW,outH);

  const od=new Uint8ClampedArray(outSize*outSize*4);
  const{yawA,pitA,elevA,tiltA,vtiltA,vsh,hsh,hR,apt}=params;

  const cosE=Math.cos(elevA),sinE=Math.sin(elevA);
  const cosT=Math.cos(tiltA),sinT=Math.sin(tiltA);
  const cosV=Math.cos(vtiltA),sinV=Math.sin(vtiltA);
  const rX=-cosT,rY=0,rZ=sinT;
  // 箱の垂直回転をright軸周りに適用
  const baseFwdX=-(sinT*cosE),baseFwdY=sinE,baseFwdZ=-(cosT*cosE);
  const fwdX=baseFwdX;
  const fwdY=baseFwdY*cosV-baseFwdZ*sinV;
  const fwdZ=baseFwdY*sinV+baseFwdZ*cosV;
  const uuX=rY*fwdZ-rZ*fwdY,uuY=rZ*fwdX-rX*fwdZ,uuZ=rX*fwdY-rY*fwdX;
  const uL=Math.sqrt(uuX*uuX+uuY*uuY+uuZ*uuZ);
  const upX=uuX/uL,upY=uuY/uL,upZ=uuZ/uL;
  const rdX=-fwdX,rdY=-fwdY,rdZ=-fwdZ;
  const hx=0.5,hy=0.5*hR,hz=0.5;
  const allFaces=[
    {nx:1, ny:0, nz:0, px:hx,  py:0,   pz:0,   s:0.92},
    {nx:-1,ny:0, nz:0, px:-hx, py:0,   pz:0,   s:0.80},
    {nx:0, ny:1, nz:0, px:0,   py:hy,  pz:0,   s:1.00},
    {nx:0, ny:-1,nz:0, px:0,   py:-hy, pz:0,   s:1.00},
    {nx:0, ny:0, nz:1, px:0,   py:0,   pz:hz,  s:0.86},
    {nx:0, ny:0, nz:-1,px:0,   py:0,   pz:-hz, s:0.86},
  ];
  const visFaces=allFaces.filter(f=>f.nx*rdX+f.ny*rdY+f.nz*rdZ>0);
  const cosY=Math.cos(yawA),sinY=Math.sin(yawA);
  const DIST=5,eps=1e-4,PI2=Math.PI/2;
  const camX=-rdX*DIST,camY=-rdY*DIST,camZ=-rdZ*DIST;
  const chunk=Math.max(8,outSize>>4);
  let row=0;

  function nextChunk(){
    const end=Math.min(row+chunk,outSize);
    for(let py=row;py<end;py++){
      for(let px=0;px<outSize;px++){
        const su=((px/outSize)-0.5)*2*apt+hsh;
        const sv=(0.5-(py/outSize))*2*apt+vsh;
        const roX=camX+rX*su+upX*sv;
        const roY=camY+rY*su+upY*sv;
        const roZ=camZ+rZ*su+upZ*sv;
        let bestT=Infinity,bf=null,bx=0,by=0,bz=0;
        for(let fi=0;fi<visFaces.length;fi++){
          const f=visFaces[fi];
          const denom=f.nx*rdX+f.ny*rdY+f.nz*rdZ;
          const num=f.nx*(f.px-roX)+f.ny*(f.py-roY)+f.nz*(f.pz-roZ);
          const t=num/denom;
          if(t<0.01||t>=bestT)continue;
          const hpx=roX+rdX*t,hpy=roY+rdY*t,hpz=roZ+rdZ*t;
          if(hpx<-hx-eps||hpx>hx+eps)continue;
          if(hpy<-hy-eps||hpy>hy+eps)continue;
          if(hpz<-hz-eps||hpz>hz+eps)continue;
          bestT=t;bf=f;bx=hpx;by=hpy;bz=hpz;
        }
        if(!bf)continue;
        const dx=bx*cosY+bz*sinY,dy=-by,dz=-bx*sinY+bz*cosY;
        const len=Math.sqrt(dx*dx+dy*dy+dz*dz);
        if(len<1e-10)continue;
        const theta=Math.atan2(dx/len,dz/len);
        const phi=Math.max(-PI2,Math.min(PI2,Math.asin(Math.max(-1,Math.min(1,dy/len)))+pitA));
        const[r,g,b]=sampleEq(theta,phi);
        const sh=bf.s,i=(py*outSize+px)*4;
        od[i]=r*sh;od[i+1]=g*sh;od[i+2]=b*sh;od[i+3]=255;
      }
    }
    row=end;
    document.getElementById('progressBar').style.width=Math.round(row/outSize*100)+'%';
    setStatus(`レンダリング中... ${Math.round(row/outSize*100)}%`);
    if(row<outSize){setTimeout(nextChunk,0);return;}
    const cc=document.createElement('canvas');cc.width=outSize;cc.height=outSize;
    const ci=cc.getContext('2d').createImageData(outSize,outSize);
    ci.data.set(od);cc.getContext('2d').putImageData(ci,0,0);
    const fit=Math.min(outW,outH);
    ctx.drawImage(cc,(outW-fit)/2,(outH-fit)/2,fit,fit);
    const pv=document.getElementById('preview');
    pv.width=outW;pv.height=outH;
    pv.getContext('2d').drawImage(oc,0,0);
    document.getElementById('placeholder').style.display='none';
    pv.style.display='block';
    document.getElementById('saveBtn').disabled=false;
    setStatus(`完了 ${outW}×${outH}px`);
  }
  nextChunk();
}

// ---- アニメON/OFF ----
let animEnabled = false;
function toggleAnim(){
  animEnabled = !animEnabled;
  const btn = document.getElementById('animToggleBtn');
  btn.textContent = animEnabled ? '🎬 アニメ出力 ON' : '🎬 アニメ出力 OFF';
  btn.classList.toggle('on', animEnabled);
  document.getElementById('animSection').style.opacity = animEnabled ? '1' : '0.4';
  document.getElementById('animSection').style.pointerEvents = animEnabled ? 'auto' : 'none';
  document.getElementById('animSectionTitle').style.opacity = animEnabled ? '1' : '0.4';
  document.getElementById('animActArea').style.display = animEnabled ? 'flex' : 'none';
  document.getElementById('animActArea').style.flexDirection = 'flex';
  if(animEnabled && srcCanvas) document.getElementById('animRunBtn').disabled = false;
}

// ---- 保存（新タブで開く → 長押し保存） ----
function saveImage(){
  const oc=document.getElementById('offscreen');
  const isJpg=currentFmt==='jpg';
  const q=parseInt(document.getElementById('jpgq').value)/100;
  const mime=isJpg?'image/jpeg':'image/png';

    w.document.write(`<html><head><title>${name}</title></head>
<body style="margin:0;background:#111;display:flex;flex-direction:column;align-items:center;padding:24px;gap:14px;font-family:sans-serif;color:#fff;">
  <p style="font-size:13px;text-align:center;line-height:1.8;">

    💻 PC: 画像を<strong>右クリック</strong> → 「名前を付けて保存」
  </p>
  <img src="${url}" style="max-width:100%;border-radius:8px;box-shadow:0 0 30px rgba(0,0,0,.5);">
</body></html>`);
    w.document.close();
    setStatus('新タブで画像を開きました');
  } else {
    setStatus('ポップアップをブロックしないでください');
  }
}

// ---- アニメ生成 ----
let animRunning = false;
function startAnim(){
  if(!srcCanvas || animRunning || !animEnabled) return;
  animRunning = true;
  document.getElementById('animRunBtn').disabled = true;
  document.getElementById('animRunBtn').textContent = '⏳ 生成中...';

  const totalFrames = getVal('animFrames', false) || 24;
  const outSize = getVal('res', false);
  const [outW, outH] = getOutputDims();
  prepareEq();

  const baseYaw   = getVal('yaw', false) * Math.PI / 180;
  const baseVtilt = getVal('vtilt', false) * Math.PI / 180;
  const pitA  = getVal('pitch', false) * Math.PI / 180;
  const elevA = getVal('elev', false) * Math.PI / 180;
  const tiltA = getVal('tilt', false) * Math.PI / 180;
  const vsh   = getVal('vshift', true), hsh = getVal('hshift', true);
  const hR    = getVal('hr', true), apt = getVal('aperture', true);
  const isJpg = currentFmt === 'jpg';
  const jpgQ  = parseInt(document.getElementById('jpgq').value) / 100;

  const frames = [];
  let frameIdx = 0;

  function renderOneFrame(){
    if(frameIdx >= totalFrames){
      animRunning = false;
      document.getElementById('animRunBtn').disabled = false;
      document.getElementById('animRunBtn').textContent = '▶ アニメ生成';
      setStatus(`🎬 ${totalFrames}枚完了 → タブで確認`);
      document.getElementById('progressBar').style.width = '0%';
      const win = window.open('', '_blank');
      if(win){
        const imgs = frames.map((url,i)=>
          `<div style="text-align:center"><p style="color:#aaa;font-size:10px;margin-bottom:3px">frame_${String(i+1).padStart(3,'0')}</p><img src="${url}" style="max-width:160px;border-radius:4px"></div>`
        ).join('');
        win.document.write(`<html><head><title>Anim Frames</title></head>
<body style="margin:0;background:#111;padding:16px;font-family:sans-serif;color:#fff">
<p style="margin-bottom:12px;font-size:12px">長押し（iOS）/ 右クリック → 保存。全${totalFrames}枚。</p>
<div style="display:flex;flex-wrap:wrap;gap:10px">${imgs}</div>
</body></html>`);
        win.document.close();
      }
      return;
    }

    const t = frameIdx / totalFrames;
    const angle = t * Math.PI * 2;
    let yawA = baseYaw, vtiltA = baseVtilt;
    if(animMode === 'yaw')       yawA = baseYaw + angle;
    else if(animMode === 'vtilt') vtiltA = baseVtilt + angle;
    else { yawA = baseYaw + angle; vtiltA = baseVtilt + Math.sin(angle) * Math.PI / 4; }

    // フレームをレンダリング
    const oc = document.getElementById('offscreen');
    oc.width = outW; oc.height = outH;
    const ctx = oc.getContext('2d');
    ctx.clearRect(0, 0, outW, outH);
    drawBackground(ctx, outW, outH);

    const od = new Uint8ClampedArray(outSize * outSize * 4);
    const cosE=Math.cos(elevA),sinE=Math.sin(elevA);
    const cosT=Math.cos(tiltA),sinT=Math.sin(tiltA);
    const cosV=Math.cos(vtiltA),sinV=Math.sin(vtiltA);
    const rX=-cosT,rY=0,rZ=sinT;
    const bfX=-(sinT*cosE),bfY=sinE,bfZ=-(cosT*cosE);
    const fwdX=bfX, fwdY=bfY*cosV-bfZ*sinV, fwdZ=bfY*sinV+bfZ*cosV;
    const uuX=rY*fwdZ-rZ*fwdY,uuY=rZ*fwdX-rX*fwdZ,uuZ=rX*fwdY-rY*fwdX;
    const uL=Math.sqrt(uuX*uuX+uuY*uuY+uuZ*uuZ);
    const upX=uuX/uL,upY=uuY/uL,upZ=uuZ/uL;
    const rdX=-fwdX,rdY=-fwdY,rdZ=-fwdZ;
    const hx=0.5,hy=0.5*hR,hz=0.5;
    const allFaces=[
      {nx:1, ny:0, nz:0, px:hx,  py:0,   pz:0,   s:0.92},
      {nx:-1,ny:0, nz:0, px:-hx, py:0,   pz:0,   s:0.80},
      {nx:0, ny:1, nz:0, px:0,   py:hy,  pz:0,   s:1.00},
      {nx:0, ny:-1,nz:0, px:0,   py:-hy, pz:0,   s:1.00},
      {nx:0, ny:0, nz:1, px:0,   py:0,   pz:hz,  s:0.86},
      {nx:0, ny:0, nz:-1,px:0,   py:0,   pz:-hz, s:0.86},
    ];
    const visFaces = allFaces.filter(f=>f.nx*rdX+f.ny*rdY+f.nz*rdZ>0);
    const cosY=Math.cos(yawA),sinY=Math.sin(yawA);
    const DIST=5,eps=1e-4,PI2=Math.PI/2;
    const camX=-rdX*DIST,camY=-rdY*DIST,camZ=-rdZ*DIST;

    for(let py=0;py<outSize;py++){
      for(let px=0;px<outSize;px++){
        const su=((px/outSize)-0.5)*2*apt+hsh;
        const sv=(0.5-(py/outSize))*2*apt+vsh;
        const roX=camX+rX*su+upX*sv;
        const roY=camY+rY*su+upY*sv;
        const roZ=camZ+rZ*su+upZ*sv;
        let bestT=Infinity,bf=null,bx=0,by=0,bz=0;
        for(let fi=0;fi<visFaces.length;fi++){
          const f=visFaces[fi];
          const denom=f.nx*rdX+f.ny*rdY+f.nz*rdZ;
          const num=f.nx*(f.px-roX)+f.ny*(f.py-roY)+f.nz*(f.pz-roZ);
          const t=num/denom;
          if(t<0.01||t>=bestT)continue;
          const hpx=roX+rdX*t,hpy=roY+rdY*t,hpz=roZ+rdZ*t;
          if(hpx<-hx-eps||hpx>hx+eps)continue;
          if(hpy<-hy-eps||hpy>hy+eps)continue;
          if(hpz<-hz-eps||hpz>hz+eps)continue;
          bestT=t;bf=f;bx=hpx;by=hpy;bz=hpz;
        }
        if(!bf)continue;
        const dx=bx*cosY+bz*sinY,dy=-by,dz=-bx*sinY+bz*cosY;
        const len=Math.sqrt(dx*dx+dy*dy+dz*dz);
        if(len<1e-10)continue;
        const theta=Math.atan2(dx/len,dz/len);
        const phi=Math.max(-PI2,Math.min(PI2,Math.asin(Math.max(-1,Math.min(1,dy/len)))+pitA));
        const[r,g,b]=sampleEq(theta,phi);
        const sh=bf.s,i=(py*outSize+px)*4;
        od[i]=r*sh;od[i+1]=g*sh;od[i+2]=b*sh;od[i+3]=255;
      }
    }
    const cc=document.createElement('canvas');cc.width=outSize;cc.height=outSize;
    const ci=cc.getContext('2d').createImageData(outSize,outSize);
    ci.data.set(od);cc.getContext('2d').putImageData(ci,0,0);
    const fit=Math.min(outW,outH);
    ctx.drawImage(cc,(outW-fit)/2,(outH-fit)/2,fit,fit);
    const mime=isJpg?'image/jpeg':'image/png';
    frames.push(oc.toDataURL(mime,isJpg?jpgQ:undefined));
    frameIdx++;
    document.getElementById('progressBar').style.width=Math.round(frameIdx/totalFrames*100)+'%';
    setStatus(`🎬 ${frameIdx}/${totalFrames}フレーム生成中...`);
    setTimeout(renderOneFrame, 0);
  }
  renderOneFrame();
}

pushHistory();
updateRatioDisplay();
</script>
